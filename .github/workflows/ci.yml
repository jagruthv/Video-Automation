- name: Module Sanity Check
        run: |
          node -e "
          const modules = [
            './src/utils/logger',
            './src/utils/retry',
            './src/modules/script-writer',
            './src/modules/voice-engine',
            './src/modules/visual-engine',
            './src/modules/supabase-uploader',
            './src/orchestrator/index'
          ];
          modules.forEach(m => {
            try {
              require.resolve(m);
              console.log('✅ OK ' + m);
            } catch (e) {
              console.log('❌ MISSING ' + m);
              process.exit(1);
            }
          });
          "
