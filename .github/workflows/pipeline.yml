# ============================================================
# AURA — Main Video Pipeline
# ============================================================
name: AURA Pipeline

on:
  schedule:
    - cron: '0 12 * * *'
    - cron: '0 14 * * *'
    - cron: '0 16 * * *'
    - cron: '0 19 * * *'
    - cron: '0 22 * * *'
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (discover + script only, no upload)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      force_now:
        description: 'Force upload right now — bypass organic schedule'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']
      channel_filter:
        description: 'Only run for this accountId (blank = all)'
        required: false
        default: ''

concurrency:
  group: aura-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install FFmpeg (Quiet Mode)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get update > /dev/null 2>&1 && sudo apt-get install -y ffmpeg > /dev/null 2>&1

      - name: Validate environment
        run: node scripts/validate-env.js
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEXUSTTS_API_KEY: ${{ secrets.NEXUSTTS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Run pipeline
        run: |
          node src/index.js \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }} \
            ${{ github.event.inputs.force_now == 'true' && '--force-now' || '' }}
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXUSTTS_API_KEY: ${{ secrets.NEXUSTTS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          GOOGLE_WHISK_COOKIE: ${{ secrets.GOOGLE_WHISK_COOKIE }}
          YT_TECH_MAIN_CLIENT_ID: ${{ secrets.YT_TECH_MAIN_CLIENT_ID }}
          YT_TECH_MAIN_CLIENT_SECRET: ${{ secrets.YT_TECH_MAIN_CLIENT_SECRET }}
          YT_TECH_MAIN_REFRESH_TOKEN: ${{ secrets.YT_TECH_MAIN_REFRESH_TOKEN }}
          BITLY_API_KEY: ${{ secrets.BITLY_API_KEY }}
          NODE_ENV: production
          LOG_LEVEL: info
          MAX_DAILY_UPLOADS_PER_CHANNEL: '5'
          ANTIFLAG_UNIQUENESS_THRESHOLD: '30'
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          CHANNEL_FILTER: ${{ github.event.inputs.channel_filter || '' }}
          FORCE_NOW: ${{ github.event.inputs.force_now || 'false' }}
          UPLOAD_WINDOW_START_HOUR: '8'
          UPLOAD_WINDOW_END_HOUR: '23'

      - name: Catch Video Artifact (For Dry Runs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aura-test-video
          path: /tmp/build/output/*.mp4
          retention-days: 1
